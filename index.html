<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>日本語単語練習ツール（MP4保存対応版）</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-xl shadow-lg overflow-hidden relative">
        
        <div class="bg-indigo-50 p-6 border-b border-indigo-100">
            <h1 id="round-title" class="text-xl font-bold text-indigo-800">1回目の練習</h1>
            <p id="round-desc" class="text-sm text-indigo-600 mt-1">順番通り（すべて表示）</p>
            <div class="mt-4 h-2 bg-indigo-200 rounded-full overflow-hidden">
                <div id="progress" class="h-full bg-indigo-500 transition-all duration-300" style="width: 0%;"></div>
            </div>
            <div id="recording-status" class="hidden mt-3 text-xs font-bold text-rose-500 flex items-center">
                <span class="w-2 h-2 rounded-full bg-rose-500 animate-pulse mr-2"></span>
                録音中
            </div>
        </div>

        <div class="p-8 text-center min-h-[300px] flex flex-col justify-center items-center">
            <div id="card-display" class="w-full"></div>
            <div id="feedback-text" class="mt-6 text-lg font-bold min-h-[1.5rem]"></div>
        </div>

        <div class="p-6 bg-slate-50 border-t border-slate-100 flex flex-col gap-4">
            <div id="start-record-container" class="flex justify-center">
                <button id="start-rec-btn" class="w-full py-4 bg-rose-500 hover:bg-rose-600 text-white font-bold rounded-lg shadow-lg">🎤 マイクを許可して練習開始</button>
            </div>
            <div id="pronunciation-area" class="hidden flex-col gap-3">
                <button id="speech-btn" class="w-full py-3 bg-indigo-100 text-indigo-700 font-bold rounded-lg">🎤 発音をチェック</button>
                <button id="next-btn" class="w-full py-3 bg-slate-800 text-white font-bold rounded-lg">次へ</button>
            </div>
        </div>

        <div id="finish-screen" class="hidden absolute inset-0 bg-white flex flex-col items-center justify-center p-6 text-center z-20">
            <div class="text-6xl mb-4">🎉</div>
            <h2 class="text-2xl font-bold text-slate-800 mb-2">お疲れ様でした！</h2>
            <p id="score-display" class="text-lg text-slate-600 mb-6"></p>
            <div class="flex flex-col gap-3 w-full px-4">
                <button id="download-audio-btn" class="w-full py-3 bg-emerald-500 text-white font-bold rounded-lg shadow flex items-center justify-center gap-2">💾 音声を保存 (.mp4)</button>
                <button id="download-log-btn" class="w-full py-3 bg-blue-500 text-white font-bold rounded-lg shadow flex items-center justify-center gap-2">📄 練習ログを保存 (.txt)</button>
            </div>
        </div>
    </div>

    <script>
        const wordData = [
            { h: "えいご", k: "英語", r: "Eigo", zh: "英文", accepted: ["英語", "えいご", "エイゴ", "えーご", "A語"] },
            { h: "すうがく", k: "数学", r: "Suugaku", zh: "數學", accepted: ["数学", "すうがく", "スウガク", "通学"] },
            { h: "ちゅうごくご", k: "中国語", r: "Chuugokugo", zh: "中文", accepted: ["中国語", "ちゅうごくご", "チュウゴクゴ", "中国"] },
            { h: "にほんご", k: "日本語", r: "Nihongo", zh: "日文", accepted: ["日本語", "にほんご", "ニホンゴ", "日本"] },
            { h: "しゃかい", k: "社会", r: "Shakai", zh: "社會", accepted: ["社会", "しゃかい", "シャカイ", "司会"] },
            { h: "りか", k: "理科", r: "Rika", zh: "理化", accepted: ["理科", "りか", "リカ", "利己", "りこ", "リコ", "理化", "以下"] },
            { h: "なに", k: "何", r: "Nani", zh: "什麼", accepted: ["何", "なに", "ナニ", "蟹", "かに", "なん", "ナン"] },
            { h: "せんせい", k: "先生", r: "Sensei", zh: "老師", accepted: ["先生", "せんせい", "センセイ", "先制"] },
            { h: "にほん", k: "日本", r: "Nihon", zh: "日本", accepted: ["日本", "にほん", "ニホン", "二本"] },
            { h: "しゅっしん", k: "出身", r: "Shusshin", zh: "出身/來自", accepted: ["出身", "しゅっしん", "シュッシン", "主神", "就寝", "送信"] },
            { h: "あれ", k: "あれ", r: "Are", zh: "那個(遠處)", accepted: ["あれ", "アレ", "荒れ"] },
            { h: "だれ", k: "だれ", r: "Dare", zh: "誰", accepted: ["誰", "だれ", "ダレ", "誰か"] }
        ];

        let currentRound = 1, currentIndex = 0, currentList = [...wordData], totalCorrect = 0;
        let isCurrentCardCorrect = false, autoAdvanceTimeout = null, sessionLogs = [];
        let mediaRecorder, audioChunks = [], isRecording = false, startTime, mimeType;

        const roundTitle = document.getElementById('round-title'), roundDesc = document.getElementById('round-desc');
        const cardDisplay = document.getElementById('card-display'), nextBtn = document.getElementById('next-btn');
        const progress = document.getElementById('progress'), finishScreen = document.getElementById('finish-screen');
        const recordingStatus = document.getElementById('recording-status'), startRecBtn = document.getElementById('start-rec-btn');
        const downloadAudioBtn = document.getElementById('download-audio-btn'), speechBtn = document.getElementById('speech-btn');
        const downloadLogBtn = document.getElementById('download-log-btn'), feedbackText = document.getElementById('feedback-text');

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = SpeechRecognition ? new SpeechRecognition() : null;
        if (recognition) {
            recognition.lang = 'ja-JP';
            recognition.onresult = (e) => {
                const transcript = e.results[0][0].transcript.replace(/[。、\s]/g, '');
                const item = currentList[currentIndex];
                const isCorrect = item.accepted.some(a => transcript.includes(a));
                sessionLogs[sessionLogs.length-1].status = isCorrect ? '○【正解】' : '×【不正解】';
                sessionLogs[sessionLogs.length-1].transcript = transcript;
                if (isCorrect) {
                    feedbackText.innerHTML = `<span class="text-emerald-600">⭕️ 正解！ (${transcript})</span>`;
                    if (!isCurrentCardCorrect) { totalCorrect++; isCurrentCardCorrect = true; }
                    clearTimeout(autoAdvanceTimeout);
                    autoAdvanceTimeout = setTimeout(goToNextCard, 1200);
                } else {
                    feedbackText.innerHTML = `<span class="text-rose-500">❌ もう少し！ (${transcript})</span>`;
                }
            };
            recognition.onstart = () => { speechBtn.innerText = '👂 聞き取り中...'; };
            recognition.onend = () => { speechBtn.innerText = '🎤 発音をチェック'; };
        }

        async function initRecording() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                // ブラウザが対応している形式で録音（中身はなんでもOK）
                mimeType = MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : 'audio/webm;codecs=opus';
                
                mediaRecorder = new MediaRecorder(stream, { mimeType });
                audioChunks = [];
                mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
                
                mediaRecorder.onstop = () => {
                    const blob = new Blob(audioChunks, { type: mimeType });
                    const url = URL.createObjectURL(blob);
                    // 保存ボタンのクリックイベントを設定（ここで .mp4 を強制）
                    downloadAudioBtn.onclick = () => {
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `practice_audio_${Date.now()}.mp4`; // 強制的に拡張子をmp4に
                        a.click();
                    };
                    stream.getTracks().forEach(t => t.stop());
                };

                startTime = Date.now();
                mediaRecorder.start();
                isRecording = true;
                recordingStatus.classList.remove('hidden');
                document.getElementById('start-record-container').classList.add('hidden');
                document.getElementById('pronunciation-area').classList.replace('hidden', 'flex');
                updateCard();
            } catch (err) { alert("マイクを許可してください"); }
        }

        function updateCard() {
            const item = currentList[currentIndex];
            isCurrentCardCorrect = false;
            feedbackText.innerHTML = '';
            const info = [{t:"1回目",d:"順番通り"},{t:"2回目",d:"ランダム(読み・意味)"},{t:"3回目",d:"ランダム(意味のみ)"}];
            roundTitle.innerText = info[currentRound-1].t;
            roundDesc.innerText = info[currentRound-1].d;
            
            const htmls = [
                `<div><div class="text-indigo-500">${item.h}</div><div class="text-5xl font-bold my-2">${item.k}</div><div class="text-2xl text-emerald-600 font-bold mt-6">${item.zh}</div></div>`,
                `<div><div class="text-5xl font-bold mb-4">${item.h}</div><div class="text-3xl text-emerald-600 font-bold">${item.zh}</div></div>`,
                `<div class="text-6xl font-bold text-emerald-600">${item.zh}</div>`
            ];
            cardDisplay.innerHTML = htmls[currentRound-1];
            progress.style.width = `${((currentIndex+1)/currentList.length)*100}%`;
            nextBtn.innerText = (currentIndex === currentList.length-1) ? (currentRound === 3 ? "完了" : "次へ") : "次へ";
            
            sessionLogs.push({ round: currentRound, word: item.k, status: '―【未発話】', transcript: '（なし）' });
            if (recognition && isRecording) { try { recognition.stop(); } catch(e){} }
        }

        function goToNextCard() {
            clearTimeout(autoAdvanceTimeout);
            if (currentIndex < currentList.length - 1) {
                currentIndex++; updateCard();
            } else if (currentRound < 3) {
                currentRound++; currentIndex = 0;
                currentList = [...wordData].sort(() => Math.random() - 0.5);
                updateCard();
            } else {
                finishScreen.classList.remove('hidden');
                document.getElementById('score-display').innerText = `正解数: ${totalCorrect} / ${wordData.length * 3}`;
                if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
            }
        }

        downloadLogBtn.onclick = () => {
            let txt = "以下の日本語練習ログと録音ファイルを解析してください。\n\n=== ログ ===\n";
            sessionLogs.forEach(l => txt += `Round${l.round} [${l.word}] ${l.status} 認識: ${l.transcript}\n`);
            const b = new Blob([txt], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(b);
            a.download = `log_${Date.now()}.txt`;
            a.click();
        };

        startRecBtn.onclick = initRecording;
        nextBtn.onclick = goToNextCard;
        speechBtn.onclick = () => recognition && recognition.start();
        window.onload = () => cardDisplay.innerHTML = `<p class="text-slate-400">マイクを許可して開始してください</p>`;
    </script>
</body>
</html>
